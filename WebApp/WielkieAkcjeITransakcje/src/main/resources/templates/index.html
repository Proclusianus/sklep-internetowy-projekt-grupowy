<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wielkie Akcje i Transakcje</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <th:block th:insert="~{fragments/common-head :: favicons}"></th:block>
</head>
<body class="bg-gray-100 font-sans">

<!-- Komunikat o pomyślnym wylogowaniu -->
<div th:if="${param.logout}" class="container mx-auto mt-4">
    <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative" role="alert">
        Pomyślnie wylogowano.
    </div>
</div>

<!-- Wstawiamy nasz nowy, w pełni dynamiczny i reużywalny nagłówek -->
<div th:replace="~{userpanel/fragments/public-header :: public-header}"></div>


<div class="flex flex-col md:flex-row items-center justify-center space-y-4 md:space-y-0 md:space-x-4 my-8">
    <img src="/img/logo_alpha.png" alt="Logo" class="w-40 h-auto md:w-52">
</div>

<main class="container mx-auto p-8">
    <!-- === BLOK DLA ZALOGOWANEGO UŻYTKOWNIKA === -->
    <div sec:authorize="isAuthenticated()">
        <h1 class="text-4xl font-bold text-center text-gray-800">Witaj z powrotem, <span sec:authentication="name"></span>!</h1>
        <p class="text-xl text-center text-gray-600 mt-4">Przejdź do panelu, aby zarządzać swoim kontem lub kontynuuj zakupy.</p>
        <div class="text-center mt-8">
            <a href="/userData" class="text-white bg-blue-600 hover:bg-blue-700 font-semibold py-3 px-6 rounded transition-colors text-lg">Przejdź do Mojego Konta</a>
        </div>
    </div>

    <!-- === BLOK DLA GOŚCIA (NIEZALOGOWANEGO) === -->
    <div sec:authorize="!isAuthenticated()">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl font-bold text-center text-gray-800">Witaj w Wielkich Akcjach i Transakcjach!</h1>
            <p class="text-xl text-center text-gray-600 mt-4">Znajdź najlepsze okazje lub sprzedawaj swoje producty.</p>
            <form th:action="@{/kupno-sprzedaz}" method="GET" class="flex w-full bg-white rounded-md border border-gray-300 overflow-hidden focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-transparent shadow-sm mt-8">
                <input
                        type="text"
                        name="search"
                        placeholder="Wpisz czego szukasz..."
                        class="w-full px-6 py-3 text-base text-gray-700 focus:outline-none"
                        aria-label="Wyszukaj producty"
                />
                <button
                        type="submit"
                        class="px-12 bg-blue-500 text-white font-semibold hover:bg-blue-600 transition-colors whitespace-nowrap"
                        aria-label="Szukaj"
                >
                    SZUKAJ
                </button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
