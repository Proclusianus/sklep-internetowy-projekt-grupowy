<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wielkie Akcje i Transakcje</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <th:block th:insert="~{fragments/common-head :: favicons}"></th:block>
</head>

<body class="bg-gray-100 font-sans">

<div th:replace="~{userpanel/fragments/header :: header}"></div>

<!-- Komunikat sukcesu z płatności -->
<div class="container mx-auto px-6 mt-4" th:if="${successMessage}">
    <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative">
        <span th:text="${successMessage}"></span>
    </div>
</div>

<main class="container mx-auto px-6 py-8 mt-4">
    <h2 class="text-3xl font-bold text-gray-800 mb-8">Historia Zamówień</h2>

    <div th:if="${orders.isEmpty()}" class="text-gray-600">Brak zamówień.</div>

    <div th:each="order : ${orders}" class="bg-white p-6 rounded-lg shadow mb-4 border border-gray-200">
        <div class="flex justify-between items-center">
            <div>
                <p class="font-bold text-lg">Zamówienie #<span th:text="${order.id}"></span></p>
                <p class="text-sm text-gray-500" th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}"></p>

                <!-- Statusy z kolorami -->
                <p class="text-sm mt-1">Status:
                    <span th:if="${order.status == 'PAID' or order.status == 'OPLACONE'}" class="font-semibold text-green-600">OPŁACONE</span>
                    <span th:if="${order.status == 'NIEOPLACONE'}" class="font-semibold text-red-600">NIEOPŁACONE</span>
                </p>
            </div>
            <div class="text-right">
                <p class="text-xl font-bold text-gray-800" th:text="${order.totalAmount} + ' BOBUX'"></p>

                <!-- Przycisk "Dokończ płatność" dla nieopłaconych -->
                <!-- (To opcjonalne, wymagałoby logiki wznawiania płatności, na razie link do szczegółów) -->
                <a th:href="@{/order/details/{id}(id=${order.id})}" class="inline-block mt-2 text-blue-600 hover:underline">Szczegóły &raquo;</a>
            </div>
        </div>
    </div>
</main>

</body>
</html>
