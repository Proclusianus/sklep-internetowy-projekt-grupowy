<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfel - Wielkie Akcje i Transakcje</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <th:block th:insert="~{fragments/common-head :: favicons}"></th:block>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

<!-- Header -->
<div th:replace="~{userpanel/fragments/header :: header}"></div>
<!-- Komunikaty -->
<div class="container mx-auto px-4 mt-6 max-w-4xl">
    <div th:if="${successMessage}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative" role="alert">
        <strong class="font-bold">Sukces!</strong>
        <span class="block sm:inline" th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">
        <strong class="font-bold">Błąd!</strong>
        <span class="block sm:inline" th:text="${errorMessage}"></span>
    </div>
</div>

<!-- Główny kontener -->
<div class="container mx-auto px-4 py-8 max-w-4xl">

    <!-- 1. SEKCJA BALANSU -->
    <div class="bg-white rounded-lg shadow-md p-8 mb-8 text-center">
        <h2 class="text-2xl font-semibold text-gray-600 mb-2">Aktualny stan konta</h2>
        <div class="text-5xl font-bold text-green-600 mb-4">
            <span th:text="${wallet.balance}">0</span>
            <span class="text-3xl text-gray-500">BOBUX</span>
        </div>

        <a href="/transactionHistory" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-full transition duration-300 shadow-sm">
            Historia Transakcji
        </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">

        <!-- 2. SEKCJA GIFT CARD -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-xl font-bold mb-4 border-b pb-2">Zrealizuj Gift Card</h3>
            <form th:action="@{/wallet/redeem-giftcard}" method="post" class="space-y-4">
                <div>
                    <label for="giftCardCode" class="block text-sm font-medium text-gray-700 mb-1">Kod karty podarunkowej</label>
                    <input type="text" id="giftCardCode" name="code" placeholder="XXXX-XXXX-XXXX"
                           class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                </div>
                <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded transition duration-300">
                    Aktywuj kod
                </button>
            </form>
        </div>

        <!-- 3. SEKCJA DOŁADOWANIA (TOP-UP) -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-xl font-bold mb-4 border-b pb-2">Doładuj konto</h3>
            <form th:action="@{/wallet/topup}" method="post" class="space-y-4">

                <!-- Ilość bobuxów -->
                <div>
                    <label for="amount" class="block text-sm font-medium text-gray-700 mb-1">Kwota doładowania (BOBUX)</label>
                    <div class="relative">
                        <input type="number" id="amount" name="amount" min="1" placeholder="np. 1000"
                               class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500">
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <span class="text-gray-500 sm:text-sm">Bobux</span>
                        </div>
                    </div>
                </div>

                <!-- Wybór metody płatności -->
                <div>
                    <label for="paymentMethod" class="block text-sm font-medium text-gray-700 mb-1">Metoda płatności</label>
                    <select id="paymentMethod" name="methodId" class="w-full border border-gray-300 rounded-md px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="" disabled selected>Wybierz zapisaną metodę...</option>

                        <!-- Iteracja po kartach - ZABEZPIECZONA przed nullem -->
                        <optgroup label="Karty płatnicze" th:if="${wallet != null and not #lists.isEmpty(wallet.ownedCards)}">
                            <option th:each="card : ${wallet.ownedCards}"
                                    th:value="${'card_' + card.id}"
                                    th:text="${'Karta kończąca się na ...' + (card.maskedNumber != null and card.maskedNumber.length() > 4 ? #strings.substring(card.maskedNumber, card.maskedNumber.length() - 4) : 'XXXX')}">
                            </option>
                        </optgroup>

                        <!-- Iteracja po kontach - ZABEZPIECZONA przed nullem -->
                        <optgroup label="Konta bankowe" th:if="${wallet != null and not #lists.isEmpty(wallet.ownedBankAccounts)}">
                            <option th:each="account : ${wallet.ownedBankAccounts}"
                                    th:value="${'bank_' + account.id}"
                                    th:text="${'Konto: ' + account.iban}">
                            </option>
                        </optgroup>

                        <!-- Opcja gdy brak metod -->
                        <option th:if="${wallet == null or (#lists.isEmpty(wallet.ownedCards) and #lists.isEmpty(wallet.ownedBankAccounts))}" disabled>
                            Brak zapisanych metod płatności
                        </option>
                    </select>
                </div>

                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition duration-300">
                    Kup Bobuxy
                </button>
            </form>
        </div>
    </div>

    <!-- 4. SEKCJA ZARZĄDZANIA METODAMI PŁATNOŚCI -->
    <div class="bg-white rounded-lg shadow-md p-8">
        <h3 class="text-2xl font-bold mb-6 border-b pb-4">Zarządzaj metodami płatności</h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">

            <!-- Zarządzanie Kartami -->
            <div>
                <div class="flex justify-between items-center mb-4">
                    <h4 class="text-lg font-semibold text-gray-700">Twoje Karty</h4>
                    <a href="/wallet/add-card" class="text-sm text-blue-600 hover:underline">+ Dodaj kartę</a>
                </div>

                <ul class="space-y-3">
                    <!-- Tylko jeśli wallet istnieje i ma karty -->
                    <th:block th:if="${wallet != null and not #lists.isEmpty(wallet.ownedCards)}">
                        <li th:each="card : ${wallet.ownedCards}" class="flex justify-between items-center bg-gray-50 p-3 rounded border">
                            <div class="flex items-center">
                                <svg class="w-6 h-6 text-gray-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                                <span th:text="${'**** **** **** ' + (card.maskedNumber != null and card.maskedNumber.length() > 4 ? #strings.substring(card.maskedNumber, card.maskedNumber.length() - 4) : 'XXXX')}">**** 1234</span>
                            </div>
                            <form th:action="@{/wallet/delete-card}" method="post" onsubmit="return confirm('Czy na pewno usunąć tę kartę?');">
                                <input type="hidden" name="cardId" th:value="${card.id}" />
                                <button type="submit" class="text-red-500 hover:text-red-700 text-sm font-medium">Usuń</button>
                            </form>
                        </li>
                    </th:block>

                    <li th:if="${wallet == null or #lists.isEmpty(wallet.ownedCards)}" class="text-gray-400 italic text-sm">Brak zapisanych kart.</li>
                </ul>
            </div>

            <!-- Zarządzanie Kontami Bankowymi -->
            <div>
                <div class="flex justify-between items-center mb-4">
                    <h4 class="text-lg font-semibold text-gray-700">Twoje Konta Bankowe</h4>
                    <a href="/wallet/add-bank-account" class="text-sm text-blue-600 hover:underline">+ Dodaj konto</a>
                </div>

                <ul class="space-y-3">
                    <!-- Tylko jeśli wallet istnieje i ma konta -->
                    <th:block th:if="${wallet != null and not #lists.isEmpty(wallet.ownedBankAccounts)}">
                        <li th:each="account : ${wallet.ownedBankAccounts}" class="flex justify-between items-center bg-gray-50 p-3 rounded border">
                            <div class="flex items-center truncate">
                                <svg class="w-6 h-6 text-gray-500 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z"></path></svg>
                                <span class="truncate max-w-[150px] md:max-w-[200px]" th:text="${account.iban}">PL00...</span>
                            </div>
                            <form th:action="@{/wallet/delete-bank-account}" method="post" onsubmit="return confirm('Czy na pewno usunąć to konto?');">
                                <input type="hidden" name="accountId" th:value="${account.id}" />
                                <button type="submit" class="text-red-500 hover:text-red-700 text-sm font-medium">Usuń</button>
                            </form>
                        </li>
                    </th:block>

                    <li th:if="${wallet == null or #lists.isEmpty(wallet.ownedBankAccounts)}" class="text-gray-400 italic text-sm">Brak zapisanych kont.</li>
                </ul>
            </div>

        </div>
    </div>

</div>

</body>
</html>
