<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dane Użytkownika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <th:block th:insert="~{fragments/common-head :: favicons}"></th:block>
</head>
<body class="bg-gray-100 font-sans">

<div th:replace="~{userpanel/fragments/header :: header}"></div>

<main class="container mx-auto px-6 py-8 mt-4">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-2xl mx-auto">
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">Edytuj dane użytkownika</h2>

        <form id="userDataForm" class="space-y-6">
            <!-- Podstawowe -->
            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="user_email" disabled class="mt-1 block w-full px-4 py-2 bg-gray-100 border border-gray-300 rounded-md">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Name użytkownika</label>
                <input type="text" id="user_username" disabled class="mt-1 block w-full px-4 py-2 bg-gray-100 border border-gray-300 rounded-md">
            </div>

            <!-- HASŁA -->
            <div class="p-4 bg-yellow-50 rounded border border-yellow-100">
                <h3 class="font-bold text-gray-700 mb-2">Zmiana hasła</h3>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Obecne hasło (Wymagane do zmiany)</label>
                    <input type="password" id="current_password" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500">
                </div>
                <div class="mt-4">
                    <label class="block text-sm font-medium text-gray-700">Nowe hasło</label>
                    <input type="password" id="new_password" disabled class="mt-1 block w-full px-4 py-2 border border-gray-300 bg-gray-100 rounded-md disabled:cursor-not-allowed">
                    <p class="text-xs text-gray-500 mt-1">Wpisz obecne hasło, aby odblokować to pole.</p>
                </div>
            </div>

            <!-- Typ konta -->
            <fieldset>
                <legend class="text-base font-medium text-gray-900">Typ konta</legend>
                <div class="mt-2 flex gap-4">
                    <label class="flex items-center">
                        <input id="account_type_individual" name="account_type" type="radio" value="INDIVIDUAL" disabled class="h-4 w-4 text-blue-600">
                        <span class="ml-2 text-gray-700">Osoba fizyczna</span>
                    </label>
                    <label class="flex items-center">
                        <input id="account_type_company" name="account_type" type="radio" value="COMPANY" disabled class="h-4 w-4 text-blue-600">
                        <span class="ml-2 text-gray-700">Firma</span>
                    </label>
                </div>
            </fieldset>

            <!-- Sekcja OSOBY -->
            <div id="individual_fields" class="hidden space-y-4 border-t pt-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-sm">Imię</label><input type="text" id="first_name" class="w-full border p-2 rounded"></div>
                    <div><label class="text-sm">Nazwisko</label><input type="text" id="last_name" class="w-full border p-2 rounded"></div>
                </div>
                <div><label class="text-sm">Telefon</label><input type="text" id="phone_nr_ind" class="w-full border p-2 rounded"></div>

                <h4 class="font-bold mt-2">Adres</h4>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2"><input type="text" id="addr_street_ind" placeholder="Ulica" class="w-full border p-2 rounded"></div>
                    <div><input type="text" id="addr_house_ind" placeholder="Nr domu" class="w-full border p-2 rounded"></div>
                    <div><input type="text" id="addr_apt_ind" placeholder="Nr mieszkania" class="w-full border p-2 rounded"></div>
                    <div><input type="text" id="addr_zip_ind" placeholder="Kod pocztowy" class="w-full border p-2 rounded"></div>
                    <div><input type="text" id="addr_city_ind" placeholder="Miasto" class="w-full border p-2 rounded"></div>
                    <div class="col-span-2"><input type="text" id="addr_country_ind" placeholder="Państwo" class="w-full border p-2 rounded"></div>
                </div>
            </div>

            <!-- Sekcja FIRMY -->
            <div id="company_fields" class="hidden space-y-4 border-t pt-4">
                <!-- (Skrócona wersja - analogicznie do osoby) -->
                <div><label class="text-sm">Name firmy</label><input type="text" id="company_name" class="w-full border p-2 rounded"></div>
                <!-- ...reszta pól firmy... -->
            </div>

            <button type="submit" id="save_btn" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Zapisz zmiany</button>
        </form>
    </div>
</main>

<script>
    const API_URL = '/api/user';

    // Logika blokowania hasła
    const currPassInput = document.getElementById('current_password');
    const newPassInput = document.getElementById('new_password');

    currPassInput.addEventListener('input', function() {
        if (this.value.length > 0) {
            newPassInput.disabled = false;
            newPassInput.classList.remove('bg-gray-100');
        } else {
            newPassInput.disabled = true;
            newPassInput.classList.add('bg-gray-100');
            newPassInput.value = '';
        }
    });

    // Inicjalizacja
    document.addEventListener('DOMContentLoaded', async () => {
        const res = await fetch(API_URL + '/current');
        if(res.ok) {
            const data = await res.json();
            fillForm(data);
        }
    });

    function fillForm(data) {
        document.getElementById('user_email').value = data.email;
        document.getElementById('user_username').value = data.username;

        const isInd = (data.accountType === 'INDIVIDUAL' || data.accountType === 'OSOBA_FIZYCZNA');

        if(isInd) {
            document.getElementById('account_type_individual').checked = true;
            document.getElementById('individual_fields').classList.remove('hidden');

            if(data.personalDetails) {
                document.getElementById('first_name').value = data.personalDetails.firstName || '';
                document.getElementById('last_name').value = data.personalDetails.lastName || '';
                document.getElementById('phone_nr_ind').value = data.personalDetails.phoneNumber || '';
            }
            if(data.mainAddress) {
                document.getElementById('addr_street_ind').value = data.mainAddress.street || '';
                document.getElementById('addr_house_ind').value = data.mainAddress.houseNumber || '';
                document.getElementById('addr_apt_ind').value = data.mainAddress.apartmentNumber || '';
                document.getElementById('addr_zip_ind').value = data.mainAddress.zipCode || '';
                document.getElementById('addr_city_ind').value = data.mainAddress.city || '';
                document.getElementById('addr_country_ind').value = data.mainAddress.country || '';
            }
        } else {
            document.getElementById('account_type_company').checked = true;
            // Tu dodaj logikę wypełniania dla firmy analogicznie
        }
    }

    document.getElementById('save_btn').addEventListener('click', async (e) => {
        e.preventDefault();

        const payload = {
            accountType: document.getElementById('account_type_individual').checked ? 'INDIVIDUAL' : 'COMPANY',
            currentPassword: currPassInput.value || null,
            newPassword: newPassInput.value || null,
            personalDetails: {
                firstName: document.getElementById('first_name').value,
                lastName: document.getElementById('last_name').value,
                phoneNumber: document.getElementById('phone_nr_ind').value
            },
            mainAddress: {
                street: document.getElementById('addr_street_ind').value,
                houseNumber: document.getElementById('addr_house_ind').value,
                apartmentNumber: document.getElementById('addr_apt_ind').value,
                zipCode: document.getElementById('addr_zip_ind').value,
                city: document.getElementById('addr_city_ind').value,
                country: document.getElementById('addr_country_ind').value
            }
        };

        const res = await fetch(API_URL + '/update', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        if(res.ok) {
            alert("Zapisano!");
            window.location.reload();
        } else {
            alert("Błąd: " + await res.text());
        }
    });
</script>
</body>
</html>
